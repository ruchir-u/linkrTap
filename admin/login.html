<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkrTap Admin Login</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell" style="display: grid; place-items: center; min-height: 100vh;">
      <div class="editor-panel" style="max-width: 360px; width: 100%;">
        <div class="brand-row">
          <div class="brand-mark">L</div>
          <div>
            <p class="eyebrow">LinkrTap</p>
            <h1>Admin login</h1>
          </div>
        </div>

        <form id="loginForm" class="editor-form">
          <label>
            Password
            <input id="passwordInput" type="password" autocomplete="current-password" required />
          </label>
          <button id="loginButton" class="download-button publish-button" type="submit">Log in</button>
          <p id="loginStatus" class="download-status" aria-live="polite"></p>
        </form>
      </div>
    </main>

    <script>
      const form = document.querySelector("#loginForm");
      const status = document.querySelector("#loginStatus");
      const button = document.querySelector("#loginButton");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        status.textContent = "Checking...";
        button.disabled = true;

        try {
          const response = await fetch("/api/admin-login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password: document.querySelector("#passwordInput").value }),
          });

          if (!response.ok) {
            const data = await response.json().catch(() => ({}));
            throw new Error(data.error || "Login failed");
          }

          window.location.href = "/admin";
        } catch (error) {
          status.textContent = error.message || "Could not log in.";
          button.disabled = false;
        }
      });
    </script>
  </body>
</html>
